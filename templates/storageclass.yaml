apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-csi-mysql
provisioner: nfs.csi.k8s.io
parameters:
  server: "192.168.1.50"
  share: "/srv/nfs/k8s"
  subDir: "mysql"
  mountPermissions: "0777"
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
mountOptions:
  - nfsvers=4.1
  - hard
  - intr